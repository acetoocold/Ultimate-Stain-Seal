kind = "web"
previewPath = "/"
title = "USS OPS - Ultimate Stain & Seal Operations"
version = "1.0.0"
id = "artifacts/uss-ops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23054

[services.development]
run = "pnpm --filter @workspace/uss-ops run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uss-ops", "run", "build" ]
publicDir = "artifacts/uss-ops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23054"
BASE_PATH = "/"
