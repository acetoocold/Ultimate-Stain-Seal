components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── AUTH ─────────────────────────────────────────────────────────────────
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [admin, employee, customer]
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, email, firstName, lastName, role, isActive, createdAt, updatedAt]

    CreateUserBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [admin, employee, customer]
        phone:
          type: ["string", "null"]
      required: [email, password, firstName, lastName, role]

    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    # ─── CUSTOMERS ────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        status:
          type: string
          enum: [lead, active, completed, inactive]
        leadSource:
          type: string
          enum: [referral, google, facebook, instagram, door_hanger, yard_sign, repeat, other]
        leadSourceDetail:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        portalEnabled:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, firstName, lastName, email, status, leadSource, portalEnabled, createdAt, updatedAt]

    CustomerDetail:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        status:
          type: string
        leadSource:
          type: string
        leadSourceDetail:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        portalEnabled:
          type: boolean
        properties:
          type: array
          items:
            $ref: "#/components/schemas/Property"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, firstName, lastName, email, status, leadSource, portalEnabled, properties, projects, invoices, createdAt, updatedAt]

    CreateCustomerBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        status:
          type: string
          enum: [lead, active, completed, inactive]
        leadSource:
          type: string
          enum: [referral, google, facebook, instagram, door_hanger, yard_sign, repeat, other]
        leadSourceDetail:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        portalEnabled:
          type: boolean
      required: [firstName, lastName, email, status, leadSource, portalEnabled]

